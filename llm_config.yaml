# Google Gemini — active LLM for grounded Armenian answers (runtime_config answer.backend: llm).
#
# Set GEMINI_API_KEY in .env (https://aistudio.google.com/apikey). GOOGLE_API_KEY or LLM_API_KEY also work.
# Override model: LLM_MODEL=gemini-1.5-pro (higher quality, slower) or gemini-2.0-flash (default).
#
# CI / offline: LLM_PROVIDER=mock in .env or provider: mock below.

provider: gemini
endpoint: null
api_key: null
model: gemini-2.0-flash
timeout_seconds: 120
temperature: 0.06
max_tokens: 8192
