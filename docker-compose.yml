# Self-hosted LiveKit for local dev.
# Config: docker/livekit.yaml (keys devkey/secret, ICE-friendly for host browsers).
# Start: docker compose up -d
# Signaling: ws://127.0.0.1:7880 — JWT from GET /api/livekit/token on the banking API.
# UDP: rtc port_range 50000-50050 (Windows Docker + mux-only UDP often breaks WebRTC).

services:
  livekit:
    # Pinned for reproducible signaling/WebRTC behavior with livekit Python SDK 1.x (bump when upgrading SDK).
    image: livekit/livekit-server:v1.9.4
    command: ["--config", "/etc/livekit.yaml"]
    volumes:
      - ./docker/livekit.yaml:/etc/livekit.yaml:ro
    ports:
      - "7880:7880"
      - "7881:7881"
      - "50000-50050:50000-50050/udp"
    restart: unless-stopped
