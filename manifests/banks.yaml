schema_version: "1"
# Corpus language is Armenian (hy) per bank.language. Prefer non-/en/ paths when the same page exists
# without /en/ (e.g. Ameriabank `ameriabank.am/personal/...` defaults to hy). English-only pages are kept only when no hy equivalent was found.
banks:
  - bank_key: "acba"
    bank_name: "ACBA Bank"
    language: "hy"
    credits:
      urls:
        - "https://www.acba.am/hy/individuals/loans"
        - "https://www.acba.am/hy/individuals/loans/credit-lines"
        - "https://www.acba.am/hy/individuals/loans/consumer-credits"
        - "https://www.acba.am/hy/individuals/loans/mortgage/purchase-mortgage"
        - "https://www.acba.am/hy/business/get-a-loan"
    deposits:
      urls:
        - "https://www.acba.am/hy/individuals/save-and-invest/deposits"
        - "https://www.acba.am/hy/individuals/save-and-invest/deposits/classic"
        - "https://www.acba.am/hy/individuals/save-and-invest/deposits/family"
        - "https://www.acba.am/hy/individuals/save-and-invest/deposits/for-children"
    branches:
      urls:
        - "https://www.acba.am/hy/about-bank/Branches-and-ATMs"
        - "https://www.acba.am/hy/about-bank/Branches-and-ATMs/Branches"

  - bank_key: "ameriabank"
    bank_name: "Ameriabank"
    language: "hy"
    credits:
      urls:
        - "https://ameriabank.am/personal/loans"
        - "https://ameriabank.am/personal/loans/consumer-loans/consumer-loans"
        - "https://ameriabank.am/personal/loans/consumer-loans/credit-line"
        - "https://ameriabank.am/personal/loans/consumer-loans/overdraft"
        - "https://ameriabank.am/personal/loans/car-loans"
        - "https://ameriabank.am/personal/loans/car-loan/primary"
        - "https://ameriabank.am/personal/loans/other-loans/investment-loan"
    deposits:
      urls:
        - "https://ameriabank.am/personal/saving/deposits/see-all"
        - "https://ameriabank.am/personal/saving/deposits/ameria-deposit"
        - "https://ameriabank.am/personal/saving/deposits/cumulative-deposit"
        # HTML leaflets index (replaces PDF). Text is often EN-heavy; `language` metadata may be non_hy.
        - "https://ameriabank.am/personal/savings/deposits/leaflets"
    branches:
      urls:
        # Primary hy service network listing (TabId/language query variants collapse here).
        - "https://ameriabank.am/service-network"

  - bank_key: "idbank"
    bank_name: "IDBank"
    language: "hy"
    credits:
      urls:
        - "https://idbank.am/credits/"
        - "https://idbank.am/credits/loans-without-collateral/"
        - "https://idbank.am/credits/loans-without-collateral/credit-lines/"
        - "https://idbank.am/credits/collateral-loans/consumer-loan/"
    deposits:
      urls:
        - "https://idbank.am/deposits/"
        - "https://idbank.am/deposits/deposit_safe/replenish/"
        - "https://idbank.am/deposits/deposit_safe/noreplenish/"
        - "https://idbank.am/deposits/demand/demand/"
    branches:
      urls:
        - "https://idbank.am/information/about/branches-and-atms/branches/"
        - "https://idbank.am/information/about/branches-and-atms/"
