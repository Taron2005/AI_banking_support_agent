topic_classifier:
  ambiguous_margin: 0.1
  strong_term_weight: 1.5
  weak_term_weight: 0.75
  fuzzy_match: true
  fuzzy_ratio: 0.78

followup:
  short_query_max_tokens: 12
  markers:
    - "իսկ"
    - "նաև"
    - "ինչը"
    - "ուր"
    - "and"
    - "what about"
    - "and for"
    - "also"
    - "բայց"
    - "իմա"
  city_terms:
    - "երևան"
    - "գյումրի"
    - "yerevan"
    - "gyumri"

evidence:
  min_chunks: 1
  # Hybrid dense+BM25 scores are often compressed; keep threshold moderate so good hits are not refused before LLM.
  min_top_score: 0.1
  branch_address_patterns:
    - "հասցե"
    - "address"
    - "street"
    - "փողոց"

answer:
  backend: "llm"
  max_evidence_chunks: 10
  max_snippet_chars: 1200
  max_chars_per_evidence: 2000
  llm_model_name: null

retrieval:
  default_top_k: 8
  # Retrieve top_k * factor dense hits before BM25 fusion + lexical rerank (higher = better recall, slightly slower).
  faiss_candidate_pool_factor: 8
  hybrid_bm25: true
  hybrid_dense_weight: 0.58
  # All-banks / compare-style questions: avoid one bank or one listing URL crowding out others.
  diversify_max_per_bank: 2
  diversify_max_per_source_url: 2
  cross_encoder_enabled: false
  cross_encoder_model: cross-encoder/ms-marco-MultilingualBERT-L-12
  cross_encoder_top_n: 24

bank_aliases:
  # Armenian variants + spacing/STT: compact matching merges spaces for aliases ≥5 chars.
  ameriabank:
    - "ameriabank"
    - "ameria bank"
    - "ameria"
    - "ամերիա"
    - "ամերիաբանկ"
    - "ամերիա բանկ"
    - "ամերիայի"
    - "ամերիաբանկի"
    - "ամերիաբանկում"
  acba:
    - "acba"
    - "acba bank"
    - "ակբա"
    - "ակբա բանկ"
  idbank:
    - "idbank"
    - "id bank"
    - "այդիբանկ"
    - "իդբանկ"
    - "այդի բանկ"

# Balanced mode: allow retrieval when the bank is implied or only in Armenian script; strict eval can re-enable gates.
# - require_explicit_bank: if true, unnamed single-bank questions → clarify before RAG (hurts hy-only bank names if detection misses).
# - clarify_when_unscoped_multi_bank_evidence: ask which bank when hits span 2+ banks but query does not scope (stricter).
orchestration:
  require_explicit_bank: false
  restrict_evidence_to_single_bank_without_comparison: false
  clarify_when_unscoped_multi_bank_evidence: false
  refuse_comparison_without_multi_bank_evidence: false
