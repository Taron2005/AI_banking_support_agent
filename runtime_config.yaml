topic_classifier:
  ambiguous_margin: 0.12
  strong_term_weight: 1.5
  weak_term_weight: 0.75

followup:
  short_query_max_tokens: 12
  markers:
    - "իսկ"
    - "նաև"
    - "ինչը"
    - "ուր"
    - "and"
    - "what about"
    - "and for"
    - "also"
    - "բայց"
    - "իմա"
  city_terms:
    - "երևան"
    - "գյումրի"
    - "yerevan"
    - "gyumri"

evidence:
  min_chunks: 1
  # Hybrid dense+BM25 scores are often compressed; keep threshold moderate so good hits are not refused before LLM.
  min_top_score: 0.12
  branch_address_patterns:
    - "հասցե"
    - "address"
    - "street"
    - "փողոց"

answer:
  backend: "llm"
  max_evidence_chunks: 5
  max_snippet_chars: 600
  max_chars_per_evidence: 900
  llm_model_name: null

retrieval:
  default_top_k: 8
  # Retrieve top_k * factor dense hits before BM25 fusion + lexical rerank (higher = better recall, slightly slower).
  faiss_candidate_pool_factor: 8
  hybrid_bm25: true
  hybrid_dense_weight: 0.58
  # All-banks / compare-style questions: avoid one bank or one listing URL crowding out others.
  diversify_max_per_bank: 2
  diversify_max_per_source_url: 2
  cross_encoder_enabled: false
  cross_encoder_model: cross-encoder/ms-marco-MultilingualBERT-L-12
  cross_encoder_top_n: 24

bank_aliases:
  ameriabank: ["ameriabank", "ameria", "ամերիա", "ամերիաբանկ"]
  acba: ["acba", "acba bank", "ակբա"]
  idbank: ["idbank", "id bank", "այդիբանկ", "իդբանկ"]

# Strict evaluation mode (optional):
# - require_explicit_bank: generic product questions must name a bank or "all banks" / comparison.
# - restrict_evidence_to_single_bank_without_comparison: collapse hits to one bank when unscoped.
# - clarify_when_unscoped_multi_bank_evidence: if retrieval spans 2+ banks but query is unscoped, ask which bank.
# - refuse_comparison_without_multi_bank_evidence: comparison queries need chunks from 2+ banks.
orchestration:
  require_explicit_bank: true
  restrict_evidence_to_single_bank_without_comparison: false
  clarify_when_unscoped_multi_bank_evidence: false
  refuse_comparison_without_multi_bank_evidence: false
