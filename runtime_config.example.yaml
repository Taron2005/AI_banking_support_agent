# Mirrors production defaults; copy to runtime_config.yaml to customize.
topic_classifier:
  ambiguous_margin: 0.12
  strong_term_weight: 1.5
  weak_term_weight: 0.75

followup:
  short_query_max_tokens: 8
  markers:
    - "իսկ"
    - "and"
    - "what about"
    - "and for"
    - "also"
    - "բայց"
  city_terms:
    - "երևան"
    - "գյումրի"
    - "yerevan"
    - "gyumri"

evidence:
  min_chunks: 1
  min_top_score: 0.12
  branch_address_patterns:
    - "հասցե"
    - "address"
    - "street"
    - "փողոց"
    - "ք."
    - "շենք"
    - "պող."
    - "հՀ,"

answer:
  backend: "llm"
  max_evidence_chunks: 5
  max_snippet_chars: 600
  max_chars_per_evidence: 900
  llm_model_name: null

retrieval:
  default_top_k: 8
  faiss_candidate_pool_factor: 8
  hybrid_bm25: true
  hybrid_dense_weight: 0.58
  diversify_max_per_bank: 2
  diversify_max_per_source_url: 2
  cross_encoder_enabled: false
  cross_encoder_model: cross-encoder/ms-marco-MultilingualBERT-L-12
  cross_encoder_top_n: 24

bank_aliases:
  ameriabank:
    - "ameriabank"
    - "ameria bank"
    - "ameria"
    - "ամերիա"
    - "ամերիաբանկ"
    - "ամերիա բանկ"
    - "ամերիայի"
    - "ամերիաբանկի"
  acba: ["acba", "acba bank", "ակբա", "ակբա բանկ"]
  idbank: ["idbank", "id bank", "այդիբանկ", "իդբանկ", "այդի բանկ"]

orchestration:
  require_explicit_bank: false
  restrict_evidence_to_single_bank_without_comparison: true
  clarify_when_unscoped_multi_bank_evidence: true
  refuse_comparison_without_multi_bank_evidence: true
