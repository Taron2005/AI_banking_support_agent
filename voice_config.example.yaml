# Voice agent — copy to voice_config.yaml or pass --voice-config (defaults use HTTP + .env).
#
# Push-to-talk: browser sends topic "voice.ptt" {type:start|end}; mic only while listening.
#
# Production path (default): HTTP Armenian STT + HTTP Armenian TTS via VOICE_* env vars.
# CI / no endpoints: set VOICE_USE_MOCK=1 or stt.provider: mock / tts.provider: mock.

livekit:
  url: "ws://127.0.0.1:7880"
  api_key: "devkey"
  api_secret: "secret"
  room_name: "banking-support-room"
  agent_identity: "banking-support-agent"
  participant_identity_prefix: "user"
  # LIVEKIT_TOKEN in .env is optional if api_key/api_secret match the LiveKit server (agent auto-mints JWT).

stt:
  provider: "http_whisper"
  language: "hy"
  # Prefer .env VOICE_STT_ENDPOINT; or set here if .env is not loaded:
  # endpoint: "http://127.0.0.1:8088/transcribe"
  endpoint: null
  # Local Whisper on CPU: allow enough time for decode; stack health-check waits separately.
  timeout_seconds: 120
  multipart_field: "file"
  upload_filename: "audio.wav"
  api_key: null
  api_key_header: "Authorization"
  response_text_field: "text"
  # Ignored when stt.endpoint / VOICE_STT_ENDPOINT is set: HTTP STT errors surface instead of mock text.
  fallback_to_mock: false

tts:
  provider: "http_tts"
  language: "hy-AM"
  # scripts/voice_http_tts_server.py maps "default" → hy-AM-AnahitNeural (edge-tts)
  voice_name: "default"
  output_encoding: "wav"
  pcm_s16le_sample_rate: 24000
  # Prefer .env VOICE_TTS_ENDPOINT; or uncomment:
  # endpoint: "http://127.0.0.1:8089/synthesize"
  endpoint: null
  timeout_seconds: 60
  api_key: null
  api_key_header: "Authorization"
  response_audio_field: "audio_base64"
  fallback_to_mock: true

behavior:
  debug: false
  verbose_trace: false
  max_response_chars: 16000
  # Assistant track sample rate (must match TTS normalization target; default 24 kHz like Edge-tts stack).
  livekit_publish_sample_rate: 24000
  # false = push TTS audio to LiveKit as fast as possible (lower latency).
  livekit_playout_realtime_pacing: false
  livekit_playout_frame_ms: 10
  # Must match text chat retrieval depth (see App.jsx top_k when posting /chat).
  chat_top_k: 8
  # Voice uses FastAPI POST /chat by default (same session_id as React) — start run_runtime_api.py first.
  # VOICE_RUNTIME_HTTP=0 uses in-process orchestrator + stream_llm_tokens below.
  route_through_runtime_api: true
  runtime_api_url: "http://127.0.0.1:8000"
  runtime_api_timeout_seconds: 180
  # Agent polls for remote mic subscription after PTT start (browser should publish track first).
  mic_track_wait_seconds: 0.7
  # After PTT end: keep buffering while trailing WebRTC frames arrive (>= ~220ms browser unpublish delay).
  pcm_trail_pause_seconds: 0.30
  # Gemini token streaming (assistant.text.delta) only when route_through_runtime_api: false. Default off = fewer timeouts.
  stream_llm_tokens: false
